version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: medicore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: medicore
      POSTGRES_USER: medicore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medicore_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicore"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: medicore-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: medicore-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://medicore:${POSTGRES_PASSWORD:-medicore_dev_pass}@postgres:5432/medicore
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-eu-west-3}
      S3_BUCKET: ${S3_BUCKET:-medicore-studies}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: medicore-celery
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://medicore:${POSTGRES_PASSWORD:-medicore_dev_pass}@postgres:5432/medicore
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/2
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
    depends_on:
      - redis
      - postgres
    volumes:
      - uploads_data:/app/uploads

  # ─── Flower (task monitoring UI) ─────────────────────────────────────────────
  flower:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: medicore-flower
    restart: unless-stopped
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_dev_pass}@redis:6379/1
    depends_on:
      - celery-worker

  # ─── Nginx (dev — optional, backend exposed directly) ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: medicore-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
